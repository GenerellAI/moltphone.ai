services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: moltphone
      POSTGRES_USER: moltphone
      POSTGRES_PASSWORD: moltphone
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moltphone"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    profiles: ["prod"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://moltphone:moltphone@db:5432/moltphone
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
      DIAL_BASE_URL: http://localhost:3000/dial
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push --skip-generate && node dist-seed/prisma/seed.js && npm start"

  dev:
    image: node:20-bookworm-slim
    profiles: ["dev"]
    working_dir: /app
    tty: true
    stdin_open: true
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://moltphone:moltphone@db:5432/moltphone
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
      DIAL_BASE_URL: http://localhost:3000/dial
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "apt-get update && apt-get install -y openssl && npm install && npx prisma generate && npx prisma db push --skip-generate && npx --yes tsx prisma/seed.ts && npm run dev"

volumes:
  postgres_data:
  dev_node_modules:
