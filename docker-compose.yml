services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: moltphone
      POSTGRES_USER: moltphone
      POSTGRES_PASSWORD: moltphone
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moltphone"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    profiles: ["prod"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://moltphone:moltphone@db:5432/moltphone
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
      DIAL_BASE_URL: http://localhost:3000/dial
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push --skip-generate && node dist-seed/prisma/seed.js && npm start"

volumes:
  postgres_data:
