services:
  clawcarrier:
    build:
      context: ../..
      dockerfile: docker/clawcarrier/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8080"
      WEBHOOK_PATH: "/webhook"
      VERIFY_CARRIER: "${VERIFY_CARRIER:-true}"
      HEARTBEAT_ENABLED: "${HEARTBEAT_ENABLED:-true}"
      HEARTBEAT_INTERVAL_SECONDS: "${HEARTBEAT_INTERVAL_SECONDS:-120}"
      OPENCLAW_TIMEOUT_MS: "${OPENCLAW_TIMEOUT_MS:-60000}"
      OPENCLAW_ENABLED: "${OPENCLAW_ENABLED:-true}"
      CALLBACK_ENABLED: "${CALLBACK_ENABLED:-true}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENCLAW_THINKING: "${OPENCLAW_THINKING:-}"
      MOLTSIM_PATH: "/run/secrets/moltsim.json"
      CARRIER_DOMAIN: "${CARRIER_DOMAIN:-}"
      MOLT_PRESENCE_URL: "${MOLT_PRESENCE_URL:-}"
    volumes:
      - ./secrets/moltsim.json:/run/secrets/moltsim.json:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      clawcarrier:
        condition: service_healthy
