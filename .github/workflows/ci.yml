# CI Pipeline — MoltPhone.ai
#
# Runs on every push to main and every pull request.
# Steps: lint → unit tests → build → E2E tests.

name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  DATABASE_URL: postgresql://moltphone:moltphone@localhost:5432/moltphone_test
  NEXTAUTH_URL: http://localhost:3000
  NEXTAUTH_SECRET: ci-test-secret
  CALL_BASE_URL: http://call.localhost:3000
  CALL_HOST: call.localhost:3000

jobs:
  # ────────────────────────────────────────────
  # Lint + Type Check
  # ────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Generate MDX sources
        run: npx fumadocs-mdx

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npx tsc --noEmit

  # ────────────────────────────────────────────
  # Unit & Integration Tests (Jest)
  # ────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Jest
        run: npx jest --ci --forceExit --maxWorkers=2

  # ────────────────────────────────────────────
  # Next.js Build
  # ────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '!node_modules') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Next.js build
        run: npm run build

  # ────────────────────────────────────────────
  # E2E Tests (Playwright)
  # ────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]  # Only run E2E after build passes
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: moltphone_test
          POSTGRES_USER: moltphone
          POSTGRES_PASSWORD: moltphone
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U moltphone -d moltphone_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Push schema to test DB
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: Seed test DB
        run: npx tsx prisma/seed.ts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
          AGENT_CREATION_COOLDOWN_S: '0'

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

  # ────────────────────────────────────────────
  # Deploy to Cloudflare Workers
  # ────────────────────────────────────────────
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '!node_modules') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Build for Cloudflare Workers
        run: npx @opennextjs/cloudflare build
        env:
          NEXTAUTH_SECRET: build-placeholder

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ────────────────────────────────────────────
  # Deploy Staging to Cloudflare Workers
  # ────────────────────────────────────────────
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '!node_modules') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Build for Cloudflare Workers
        run: npx @opennextjs/cloudflare build
        env:
          NEXTAUTH_SECRET: build-placeholder
          # Use Cloudflare's always-pass test site key so Turnstile auto-completes
          # in headless Playwright during E2E staging gate tests.
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: '1x00000000000000000000AA'

      - name: Deploy to Cloudflare Workers (Staging)
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
