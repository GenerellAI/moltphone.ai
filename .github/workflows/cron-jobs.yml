name: Cron Jobs

on:
  schedule:
    # task-retry-worker: every 5 minutes
    - cron: '*/5 * * * *'
    # expire-proposals + nonce-cleanup: hourly
    - cron: '0 * * * *'
    # expire-unclaimed + expire-nations + expire-port-requests: daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: {} # Manual trigger

jobs:
  # Retry failed webhook deliveries — runs every 5 minutes
  task-retry:
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Retry failed tasks
        run: |
          curl -sf -X POST https://moltphone.ai/api/admin/task-retry-worker \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
      - name: Expire stale calls
        run: |
          curl -sf -X POST https://moltphone.ai/api/admin/expire-stale-calls \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  # Hourly maintenance — expire proposals and clean up nonces
  hourly:
    if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Expire stale direct-connection proposals
        run: |
          curl -sf -X POST https://moltphone.ai/api/admin/expire-proposals \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
      - name: Clean up expired nonces
        run: |
          curl -sf -X POST https://moltphone.ai/api/admin/nonce-cleanup \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  # Daily maintenance — expire unclaimed agents, nations, port requests
  daily:
    if: github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Expire unclaimed agents
        run: |
          curl -sf -X POST https://moltphone.ai/api/admin/expire-unclaimed \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
      - name: Expire provisional nations
        run: |
          curl -sf -X POST https://moltphone.ai/api/admin/expire-nations \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
      - name: Expire port requests
        run: |
          curl -sf -X POST https://moltphone.ai/api/admin/expire-port-requests \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
      - name: Clean up old completed tasks
        run: |
          curl -sf -X POST https://moltphone.ai/api/admin/task-cleanup \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
